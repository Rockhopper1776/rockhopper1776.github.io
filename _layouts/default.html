<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.url == '/' %}{{ site.title | escape }}{% elsif page.title %}{{ page.title | escape }} | {{ site.title | escape }}{% else %}{{ site.title | escape }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description | escape }}">
  <meta name="theme-color" content="#f7f3ea">
  <link rel="canonical" href="{{ page.url | absolute_url }}">
  <link rel="stylesheet" href="{{ '/styles.css' | relative_url }}">
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="site-header">
    <div class="container nav-wrap">
      <a class="brand" href="{{ '/' | relative_url }}" aria-label="Rockhopper 1776 home">
        <span class="brand-mark">R</span>
        <span class="brand-text">Rockhopper 1776</span>
      </a>

      <nav class="main-nav" aria-label="Primary navigation">
        <a{% if page.section == 'azerothcore' %} class="active" aria-current="page"{% endif %} href="{{ '/azerothcore.html' | relative_url }}">AzerothCore</a>
        <a{% if page.section == 'boardgames' %} class="active" aria-current="page"{% endif %} href="{{ '/boardgames/' | relative_url }}">Boardgames</a>
        <a{% if page.section == 'writings' %} class="active" aria-current="page"{% endif %} href="{{ '/articles/' | relative_url }}">Writings</a>
        <a{% if page.section == 'about' %} class="active" aria-current="page"{% endif %} href="{{ '/about/' | relative_url }}">About</a>
      </nav>
    </div>
  </header>

  <main id="main" class="site-main{% unless page.full_width %} container page{% endunless %}">
{{ content }}
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>&copy; {{ site.time | date: "%Y" }} Kevin Conway. All rights reserved.</p>
    </div>
  </footer>
</body>
</html>
