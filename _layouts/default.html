<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/styles.css' | relative_url }}">
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="site-header">
    <div class="container nav-wrap">
      <a class="brand" href="{{ '/' | relative_url }}" aria-label="Rockhopper 1776 home">
        <span class="brand-mark">R</span>
        <span class="brand-text">Rockhopper 1776</span>
      </a>

      <nav class="main-nav" aria-label="Primary navigation">
        <a href="{{ '/azerothcore.html' | relative_url }}">AzerothCore</a>
        <a href="{{ '/boardgames/' | relative_url }}">Boardgames</a>
        <a href="{{ '/articles/' | relative_url }}">Writings</a>
        <a href="{{ '/about/' | relative_url }}">About</a>
      </nav>
    </div>
  </header>

  <main id="main" class="container page">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>&copy; {{ site.time | date: "%Y" }} Kevin Conway. All rights reserved.</p>
      <p><a href="{{ '/about/' | relative_url }}">About this site</a></p>
    </div>
  </footer>
</body>
</html>
